services:
  - type: web
    name: techwiki
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 4000
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOW_REGISTRATION
        value: "true"
      - key: AI_PROVIDER
        value: "groq"
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: "llama-3.3-70b-versatile"
      - key: RAG_ENABLED
        value: "true"
      - key: RAG_PROVIDER
        value: "wikipedia"
